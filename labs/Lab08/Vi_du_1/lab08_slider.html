<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
      <link rel="icon" type="image/svg+xml" href="../../../assets/images/favicon.png">
<link rel="stylesheet" href="../Vi_du_1/css/lab08_slider.css">
</head>
<body>
    <div id="slider_container">
        <div class="mySlides">
            <img src="../img/slide_1.jpg" alt="">
        </div>
        <div class="mySlides">
            <img src="../img/slide_2.jpg" alt="">
        </div>
        <div class="mySlides">
            <img src="../img/slide_1.jpeg" alt="">
        </div>
        <div class="mySlides">
            <img src="../img/slide_4.jpg" alt="">
        </div>
        <div class="mySlides">
            <img src="../img/slide_5.jpg"  alt="">
        </div>

        <a class="next" onclick="plusSlide(1)">></a>
        <a class="prev" onclick="plusSlide(-1)"><</a>
    </div>
    <br>
    <div style="text-align: center;">
        <span class="dot active" onclick="currentSlide(1)"></span>
        <span class="dot" onclick="currentSlide(2)"></span>
        <span class="dot" onclick="currentSlide(3)"></span>
        <span class="dot" onclick="currentSlide(4)"></span>
        <span class="dot" onclick="currentSlide(5)"></span>
    </div>

    <script>
        let slideIndex = 1;
        showSlides(slideIndex);

        function plusSlide(n) {
            showSlides((slideIndex+=n));
        }

        function currentSlide(n) {
            showSlides((slideIndex = n));
        }

        function showSlides(n) {
            let i;
            let slides = document.getElementsByClassName('mySlides');
            let dots = document.getElementsByClassName('dot');
            if(n>slides.length) {
                slideIndex = 1;
            }
            if(n<1) {
                slideIndex = slides.length;
            }
            for(i =0; i < slides.length; i++) {
                slides[i].style.display = 'none';
            }
            for(i=0;i<dots.length;i++) {
                dots[i].className = dots[i].className.replace(' active','');
            }

            slides[slideIndex -1].style.display = 'block';
            dots[slideIndex - 1].className += ' active ';
        }
    </script>
</body>
</html>
